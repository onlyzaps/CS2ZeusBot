- name: Delete All Previous Releases and Tags
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Fetch all release tags and delete them along with their git tags
        RELEASES=$(gh release list --limit 1000 | awk '{print $1}')
        for release in $RELEASES; do
          if [ -n "$release" ]; then
            echo "Deleting release and tag: $release"
            gh release delete "$release" -y --cleanup-tag || true
          fi
        done
        
        # Backup cleanup: Ensure the v1.0 tag is completely removed from origin 
        git push --delete origin v1.0 || true
        
        # FIX: Delete the tag locally so the runner's git cache doesn't confuse the gh cli
        git tag -d v1.0 || true

    - name: Create GitHub Release v1.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Upload the zip file as v1.0 and explicitly target the current commit SHA
        gh release create "v1.0" ZeusBotAI-1.0.zip \
          --title "Zeus Bot AI v1.0" \
          --notes "Automated release of Zeus Bot AI version 1.0." \
          --latest \
          --target ${{ github.sha }}
